spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9999/.well-known/jwks.json

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MariaDB
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  sql:
    init:
      mode: never

server:
  port: 0

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.team2.master.entity,com.team2.master.dto
  configuration:
    map-underscore-to-camel-case: true
