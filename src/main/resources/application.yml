spring:
  application:
    name: team2-backend-master

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://backend-auth:8011/.well-known/jwks.json}

  datasource:
    url: ${DB_URL:jdbc:h2:mem:team2_master;MODE=MariaDB}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: embedded

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
    region:
      static: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${AWS_S3_BUCKET:team2-bucket}
      public-url-prefix: ${AWS_S3_PUBLIC_URL_PREFIX:}

server:
  port: 8012

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.team2.master.command.domain.entity,com.team2.master.command.application.dto,com.team2.master.query.dto
  type-handlers-package: com.team2.master.config
  configuration:
    map-underscore-to-camel-case: true

jwt:
  fallback-public-key-path: ${JWT_FALLBACK_PUBLIC_KEY_PATH:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8001}

internal:
  api:
    token: ${INTERNAL_API_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health, info
