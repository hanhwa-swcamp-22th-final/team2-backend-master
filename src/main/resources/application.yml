spring:
  application:
    name: team2-backend-master

  datasource:
    url: ${DB_URL:jdbc:h2:mem:team2_master;MODE=MariaDB}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

server:
  port: 8012

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.team2.master.command.domain.entity,com.team2.master.command.application.dto,com.team2.master.query.dto
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
